# Test profile defaults (do not depend on prod/local env vars)
spring.main.banner-mode=off

# Use in-memory DB for tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Let Hibernate create schema for tests; Flyway migrations are Postgres-specific in places.
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# Avoid view-time DB queries in tests
spring.jpa.open-in-view=false

# Avoid OpenAI hard-fail in tests (bean init checks key)
openai.api-key=test

