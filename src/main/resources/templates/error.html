<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Something went wrong — SarvashikshaAI</title>
    <link rel="icon" th:href="@{/favicon.svg}" type="image/svg+xml"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="app-layout">
<main class="layout-main" style="margin-left:0;max-width:760px;margin-right:auto;margin-left:auto;padding:40px 20px 48px;">
    <section class="bank-section">
        <h1 style="margin-top:0;font-size:1.45rem;">We could not open this page</h1>
        <p class="layout-lead" style="margin-bottom:14px;line-height:1.55;">
            Something went wrong while loading this screen. You can go back, try again, or open the dashboard.
        </p>
        <p style="margin:0 0 18px;color:var(--muted);font-size:0.9rem;">
            <span th:if="${status != null}">Code <strong th:text="${status}">—</strong></span>
            <span th:if="${status == null}">Please try again in a moment.</span>
            <span th:if="${error != null and !#strings.isEmpty(error)}">
                <span> — </span><span th:text="${error}">Error</span>
            </span>
        </p>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <a href="javascript:history.back()" class="btn-primary" style="text-decoration:none;background:var(--surface);color:var(--text);border:1px solid var(--border);">Go back</a>
            <a th:href="@{/teacher/dashboard}" class="btn-primary" style="text-decoration:none;">Dashboard</a>
            <a th:href="@{/login}" class="btn-primary" style="text-decoration:none;background:var(--surface);color:var(--text);border:1px solid var(--border);">Login</a>
        </div>
    </section>
</main>
</body>
</html>
