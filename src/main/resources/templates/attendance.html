<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Attendance — SarvashikshaAI</title>
    <link rel="icon" th:href="@{/favicon.svg}" type="image/svg+xml"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        .att-wrap { max-width: 980px; margin: 0 auto; padding: 16px 20px 30px; }
        .att-top { display:flex;justify-content:space-between;align-items:flex-end;gap:10px;flex-wrap:wrap;margin-bottom:10px; }
        .att-top h2 { margin:0; font-size:1.3rem; }
        .att-controls { display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px; }
        .att-input { padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--surface); font-size: 1rem; }
        .att-btn { padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-weight:700; }
        .att-btn.primary { background: var(--primary); color:#fff; border-color: var(--primary); }
        .att-btn.present { background:#10b981;color:#fff;border-color:#10b981; }
        .att-btn.absent { background:#ef4444;color:#fff;border-color:#ef4444; }
        .att-lock { margin:8px 0 12px;padding:10px;border:1px solid #fecaca;background:#fff1f2;color:#9f1239;border-radius:10px;font-weight:700; }
        .att-mode-row { display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;margin:10px 0 12px; }
        .att-list { border:1px solid var(--border); border-radius:10px; overflow:hidden; }
        .att-row { display:grid; grid-template-columns: 1fr auto auto auto; gap:8px; align-items:center; padding:7px 10px; border-top:1px solid var(--border); }
        .att-row:first-child { border-top:none; }
        .att-row.marked-present { background:#ecfdf5; }
        .att-row.marked-absent { background:#fef2f2; }
        .att-name { font-weight:700; font-size:0.9rem; }
        .att-sub { color:var(--muted); font-size:0.78rem; }
        .att-search { width: 260px; }
        /* Keep Roll Call modal aligned with the main pane (moves when sidebar/menu opens).
           Using `position:absolute` instead of `fixed` prevents the overlay from anchoring to the viewport. */
        .rollcall-overlay { position:absolute; inset:0; width:100%; height:100%; box-sizing:border-box; background:rgba(15,23,42,0.42); display:none; align-items:center; justify-content:center; z-index:3000; padding:16px; }
        .rollcall-card { width:min(620px, 96vw); margin:0 auto; box-sizing:border-box; background:#fff; border:1px solid var(--border); border-radius:14px; padding:18px; }
        .rollcall-title { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:6px; }
        .rollcall-title h3 { margin:0; font-size:1.05rem; }
        .rollcall-meta { color:var(--muted); margin-bottom:12px; text-align:center; }
        .rollcall-name { font-size:1.8rem; font-weight:800; text-align:center; margin:8px 0 4px; }
        .rollcall-sub { text-align:center; color:var(--muted); margin-bottom:14px; }
        .rollcall-actions { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-bottom: 0; }
        #rollSummary.rollcall-complete-msg {
            margin-top: 18px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .voice-status { text-align:center; color:var(--muted); margin:6px 0 10px; font-size:0.86rem; min-height: 20px; }
        .att-list-footer { display:flex; justify-content:space-between; align-items:center; gap:8px; padding:8px 10px; border-top:1px solid var(--border); background:var(--surface); }
        .att-page-meta { color:var(--muted); font-size:0.82rem; }
        .att-status { font-size:0.82rem; font-weight:700; padding:6px 10px; border-radius:999px; border:1px solid var(--border); }
        .att-status.present { color:#065f46; background:#d1fae5; border-color:#a7f3d0; }
        .att-status.absent { color:#991b1b; background:#fee2e2; border-color:#fecaca; }
        .att-status.pending { color:var(--muted); background:var(--surface); }
        .att-btn.start { padding:12px 22px; font-size:1rem; border-radius:12px; }
        .att-start-empty {
            margin: 8px 0 12px;
            padding: 18px 14px;
            border: 1px dashed var(--border);
            border-radius: 12px;
            background: var(--surface);
            text-align: center;
            color: var(--muted);
        }
        /* Center column in the main pane (was hugging the left on wide screens) */
        body.attendance-page.app-layout > .layout-main {
            align-items: center;
        }
        body.attendance-page .att-wrap {
            width: 100%;
            max-width: 720px;
            margin-left: auto;
            margin-right: auto;
        }
        body.attendance-page .att-top {
            justify-content: center;
            text-align: center;
        }
        body.attendance-page .att-top h2 {
            width: 100%;
        }
        body.attendance-page .att-controls {
            justify-content: center;
        }
        body.attendance-page .att-mode-row {
            justify-content: center;
        }
    </style>
</head>
<body class="app-layout attendance-page">
<div th:replace="~{fragments/loader :: loader}"></div>
<div th:replace="~{fragments/shell-teacher :: sidebar('attendance')}"></div>
<main class="layout-main">
<div class="att-wrap">
    <div class="att-top">
        <h2><i class="fa-solid fa-clipboard-check"></i> Attendance</h2>
    </div>
    <form class="att-controls" th:action="@{/attendance}" method="get" id="attendanceFilterForm">
        <input class="att-input" type="date" name="date" id="dateInput" th:value="${currentDate}" th:max="${today}"/>
        <select class="att-input" name="grade" id="gradeInput">
            <option value="" th:selected="${gradeFilter == null or gradeFilter == ''}">All Grades</option>
            <option th:each="g : ${gradeOptions}" th:value="${g.code}" th:text="${g.label}" th:selected="${gradeFilter == g.code}">Grade</option>
        </select>
        <a class="att-btn" th:href="@{/attendance/export(from=${currentDate.minusMonths(1)},to=${currentDate})}">Export CSV</a>
    </form>

    <div class="att-start-empty" id="attendanceStartState" th:if="${!students.isEmpty()}">
        <div style="margin-bottom:10px;">Click here to start attendance</div>
        <button class="att-btn primary start" id="startRollCallCtaBtn" type="button" onclick="startRollCall()">Start Roll Call</button>
    </div>

    <div class="att-mode-row" th:if="${!students.isEmpty()}">
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="att-btn" id="toggleListBtn" type="button" style="display:none;" onclick="toggleListView()">Show List</button>
        </div>
    </div>

    <div class="att-list" id="listPanel" style="display:none;" th:if="${!students.isEmpty()}">
        <div class="att-row"
             th:each="student : ${students}"
             th:id="'row-' + ${student.name}"
             th:attr="data-name=${student.name},data-grade=${student.grade},data-roll=${student.code}"
             th:classappend="${markedMap.containsKey(student.name) ? (markedMap.get(student.name) ? ' marked-present' : ' marked-absent') : ''}">
            <div>
                <div class="att-name" th:text="${student.name}">Name</div>
                <div class="att-sub">
                    <span th:text="'Grade ' + ${student.grade}">Grade</span>
                    <span th:if="${student.code != null and !#strings.isEmpty(student.code)}" th:text="' • Roll ' + ${student.code}"> • Roll</span>
                </div>
            </div>
            <span class="att-status"
                  th:classappend="${markedMap.containsKey(student.name) ? (markedMap.get(student.name) ? ' present' : ' absent') : ' pending'}"
                  th:text="${markedMap.containsKey(student.name) ? (markedMap.get(student.name) ? 'Present' : 'Absent') : 'Not marked'}">Status</span>
            <button class="att-btn present" type="button" th:id="'btn-present-' + ${student.name}" th:attr="data-name=${student.name}" onclick="markList(this, true)">Update: Present</button>
            <button class="att-btn absent" type="button" th:id="'btn-absent-' + ${student.name}" th:attr="data-name=${student.name}" onclick="markList(this, false)">Update: Absent</button>
        </div>
        <div class="att-list-footer">
            <div class="att-page-meta" id="pageMeta">Showing 0-0 of 0</div>
            <div style="display:flex;gap:8px;">
                <button class="att-btn" type="button" id="prevPageBtn" onclick="prevPage()">Previous</button>
                <button class="att-btn" type="button" id="nextPageBtn" onclick="nextPage()">Next</button>
            </div>
        </div>
    </div>

    <div th:if="${students.isEmpty()}" style="padding:32px 14px;color:var(--muted);text-align:center;border:1px solid var(--border);border-radius:12px;background:var(--surface);">
        <div style="font-weight:700;color:var(--text);margin-bottom:6px;">No students available</div>
        <div>Nothing to mark for this date.</div>
    </div>
</div>
<div class="rollcall-overlay" id="rollCallModal" th:if="${!students.isEmpty()}">
    <div class="rollcall-card">
        <div class="rollcall-title">
            <h3>Roll Call</h3>
            <button class="att-btn" type="button" onclick="closeRollCall()">Close</button>
        </div>
        <div id="rollProgress" class="rollcall-meta">0 / 0 students marked</div>
        <div id="rollName" class="rollcall-name">-</div>
        <div id="rollMeta" class="rollcall-sub">-</div>
        <div id="voiceStatus" class="voice-status">Reading name aloud...</div>
        <div class="rollcall-actions">
            <button class="att-btn present" type="button" onclick="markCurrent(true)">Present</button>
            <button class="att-btn absent" type="button" onclick="markCurrent(false)">Absent</button>
            <button class="att-btn" type="button" onclick="prevStudent()">Previous</button>
            <button class="att-btn" type="button" onclick="nextStudent()">Next</button>
            <button class="att-btn" type="button" onclick="skipStudent()">Skip</button>
        </div>
        <div class="rollcall-meta rollcall-complete-msg" id="rollSummary" style="display:none;font-weight:700;">Attendance Complete</div>
        <p id="rollCompleteHint" class="rollcall-meta" style="display:none;font-weight:500;font-size:0.88rem;margin-top:10px;">Tap <strong>Close</strong> when you are finished.</p>
    </div>
</div>
</main>
<div th:replace="~{fragments/monitor-panel :: active}"></div>
<script th:src="@{/js/monitor.js}"></script>
<script th:inline="javascript">
const attendanceLocked = /*[[${attendanceLocked}]]*/ false;
const currentDateStr = document.getElementById('dateInput') ? document.getElementById('dateInput').value : new Date().toISOString().slice(0, 10);
const currentGradeFilter = document.getElementById('gradeInput') ? document.getElementById('gradeInput').value : '';
const rows = Array.from(document.querySelectorAll('.att-row'));
let filteredRows = rows.slice();
let currentIndex = 0;
let currentPage = 1;
const pageSize = 20;
const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
let rollCallRecognition = null;
let rollCallOpen = false;
let awaitingVoiceMark = false;
let promptRepeatTimer = null;
let rollCallCompleteAnnounced = false;

function updateRollCallCta() {
    const startBtn = document.getElementById('startRollCallCtaBtn');
    const startState = document.getElementById('attendanceStartState');
    if (!startBtn || !startState) return;

    const total = filteredRows.length;
    const marked = countMarkedInFilter();
    const done = total > 0 && marked >= total;

    if (done) {
        startBtn.textContent = 'Update Attendance';
        startState.style.display = 'none';
        return;
    }

    startBtn.textContent = marked > 0 ? 'Continue Roll Call' : 'Start Roll Call';
    // Only show this CTA when roll-call popup is not open and list is not being shown
    const modal = document.getElementById('rollCallModal');
    const list = document.getElementById('listPanel');
    const modalOpen = modal && getComputedStyle(modal).display !== 'none';
    const listOpen = list && getComputedStyle(list).display !== 'none';
    startState.style.display = (!modalOpen && !listOpen) ? '' : 'none';
}

function setVoiceStatus(text) {
    const node = document.getElementById('voiceStatus');
    if (node) node.textContent = text;
}

function clearPromptTimer() {
    if (promptRepeatTimer) {
        clearTimeout(promptRepeatTimer);
        promptRepeatTimer = null;
    }
}

function countMarkedInFilter() {
    let marked = 0;
    filteredRows.forEach(function (r) {
        if (r.classList.contains('marked-present') || r.classList.contains('marked-absent')) marked++;
    });
    return marked;
}

function isRollCallAllMarked() {
    const total = filteredRows.length;
    return total > 0 && countMarkedInFilter() >= total;
}

function initRollCallVoice() {
    if (!SpeechRecognitionAPI || rollCallRecognition) return;
    rollCallRecognition = new SpeechRecognitionAPI();
    rollCallRecognition.continuous = true;
    rollCallRecognition.interimResults = false;
    rollCallRecognition.lang = 'en-IN';

    rollCallRecognition.onresult = function (event) {
        const result = event.results[event.results.length - 1];
        if (!result || !result[0]) return;
        const cmd = String(result[0].transcript || '').toLowerCase().trim();
        if (!cmd) return;

        if (cmd.includes('present') || cmd.includes('yes') || cmd.includes('here') || cmd.includes('haan')) {
            window.__monitorSuppressUntil = Date.now() + 2200;
            markCurrent(true);
            setVoiceStatus('Heard: present');
            return;
        }
        if (cmd.includes('absent') || cmd.includes('no') || cmd.includes('nahi')) {
            window.__monitorSuppressUntil = Date.now() + 2200;
            markCurrent(false);
            setVoiceStatus('Heard: absent');
            return;
        }
        if (cmd.includes('next')) {
            nextStudent();
            setVoiceStatus('Heard: next');
            return;
        }
        if (cmd.includes('previous') || cmd.includes('back')) {
            prevStudent();
            setVoiceStatus('Heard: previous');
            return;
        }
        if (cmd.includes('skip')) {
            skipStudent();
            setVoiceStatus('Heard: skip');
            return;
        }
        if (cmd.includes('close') || cmd.includes('stop')) {
            closeRollCall();
            setVoiceStatus('Heard: close');
            return;
        }
        setVoiceStatus('Heard: ' + cmd + ' (say present/absent/next/previous/skip/close)');
    };

    rollCallRecognition.onerror = function () {
        if (!rollCallOpen || !awaitingVoiceMark) return;
        setVoiceStatus('Listening again...');
    };

    rollCallRecognition.onend = function () {
        if (!rollCallOpen || !awaitingVoiceMark) return;
        try { rollCallRecognition.start(); } catch (e) { /* ignore restart races */ }
    };
}

function speakCurrentPrompt() {
    if (!rollCallOpen || !filteredRows.length) return;
    if (window.monitorIsPriorityActive && window.monitorIsPriorityActive()) {
        clearPromptTimer();
        promptRepeatTimer = setTimeout(function () {
            speakCurrentPrompt();
        }, 900);
        return;
    }
    if (isRollCallAllMarked()) {
        clearPromptTimer();
        awaitingVoiceMark = false;
        window.speechSynthesis.cancel();
        return;
    }
    const row = filteredRows[currentIndex];
    if (!row) return;
    const name = row.getAttribute('data-name') || 'Student';

    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(name + '. Present or absent?');
    utter.lang = 'en-IN';
    utter.rate = 0.9;
    utter.pitch = 1.0;
    utter.onend = function () {
        if (!rollCallOpen || !awaitingVoiceMark) return;
        if (isRollCallAllMarked()) return;
        clearPromptTimer();
        promptRepeatTimer = setTimeout(function () {
            speakCurrentPrompt();
        }, 1800);
    };
    utter.onerror = function () {
        if (!rollCallOpen || !awaitingVoiceMark) return;
        if (isRollCallAllMarked()) return;
        clearPromptTimer();
        promptRepeatTimer = setTimeout(function () {
            speakCurrentPrompt();
        }, 1800);
    };
    setVoiceStatus('Listening for present or absent');
    try { window.speechSynthesis.speak(utter); } catch (e) { /* ignore */ }
}

function markAttendanceSilent(name, present) {
    return fetch('/attendance/mark', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ studentName: name, date: currentDateStr, present, grade: currentGradeFilter })
    }).then(r => r.json()).catch(() => ({ status: 'err' }));
}

function handleLockedState() {
    closeRollCall();
}

function setRowVisual(row, present) {
    row.classList.remove('marked-present', 'marked-absent');
    row.classList.add(present ? 'marked-present' : 'marked-absent');
    var status = row.querySelector('.att-status');
    if (status) {
        status.classList.remove('present', 'absent', 'pending');
        status.classList.add(present ? 'present' : 'absent');
        status.textContent = present ? 'Present' : 'Absent';
    }
}

function markList(btn, present) {
    const name = btn.getAttribute('data-name');
    const row = document.getElementById('row-' + name);
    if (!row) return;
    setRowVisual(row, present);
    markAttendanceSilent(name, present).then(function (d) {
        refreshProgress();
    });
}

function resetRollCallCompleteUi() {
    var actions = document.querySelector('.rollcall-actions');
    if (actions) actions.style.display = '';
    var hint = document.getElementById('rollCompleteHint');
    if (hint) hint.style.display = 'none';
    rollCallCompleteAnnounced = false;
}

function celebrateAttendanceComplete() {
    var emojis = ['🎉', '👏', '✨', '🎊'];
    for (var i = 0; i < 22; i++) {
        var span = document.createElement('span');
        span.textContent = emojis[i % emojis.length];
        span.style.position = 'fixed';
        span.style.left = (8 + Math.random() * 84) + 'vw';
        span.style.top = '-20px';
        span.style.zIndex = '9999';
        span.style.pointerEvents = 'none';
        span.style.fontSize = (14 + Math.random() * 14) + 'px';
        span.style.transition = 'transform 1.8s ease-out, opacity 1.8s ease-out';
        document.body.appendChild(span);
        setTimeout((function (el) {
            return function () {
                el.style.transform = 'translateY(' + (65 + Math.random() * 20) + 'vh)';
                el.style.opacity = '0';
            };
        })(span), 30 + i * 28);
        setTimeout((function (el) { return function () { el.remove(); }; })(span), 2200);
    }
}

function speakAttendanceCompleteOnce() {
    if (rollCallCompleteAnnounced) return;
    rollCallCompleteAnnounced = true;
    if (window.monitorIsPriorityActive && window.monitorIsPriorityActive()) {
        setTimeout(function () {
            // try again when monitor finishes
            rollCallCompleteAnnounced = false;
            speakAttendanceCompleteOnce();
        }, 900);
        return;
    }
    try {
        window.speechSynthesis.cancel();
        var u = new SpeechSynthesisUtterance('Attendance complete');
        u.lang = 'en-IN';
        u.rate = 0.95;
        window.speechSynthesis.speak(u);
    } catch (e) { /* ignore */ }
    celebrateAttendanceComplete();
}

function applyRollCallCompleteUi() {
    clearPromptTimer();
    awaitingVoiceMark = false;
    window.speechSynthesis.cancel();
    /* Quiet classroom monitor TTS briefly after attendance so it does not overlap / keep "speaking" */
    window.__monitorSuppressUntil = Date.now() + 12000;
    try { window.__monitorTtsActive = false; } catch (e) {}
    if (rollCallRecognition) {
        try { rollCallRecognition.stop(); } catch (e) { /* ignore */ }
    }
    setVoiceStatus('Attendance Complete. Close when you are ready.');
    speakAttendanceCompleteOnce();
    var actions = document.querySelector('.rollcall-actions');
    if (actions) actions.style.display = 'none';
    var hint = document.getElementById('rollCompleteHint');
    if (hint) hint.style.display = '';
}

function refreshProgress() {
    const total = filteredRows.length;
    let marked = 0;
    filteredRows.forEach(function (r) {
        if (r.classList.contains('marked-present') || r.classList.contains('marked-absent')) marked++;
    });
    const p = document.getElementById('rollProgress');
    if (p) p.textContent = marked + ' / ' + total + ' students marked';
    const done = marked >= total && total > 0;
    const s = document.getElementById('rollSummary');
    if (s) s.style.display = done ? '' : 'none';
    updateRollCallCta();
    if (done) {
        const list = document.getElementById('listPanel');
        if (list) list.style.display = '';
        const toggleBtn = document.getElementById('toggleListBtn');
        if (toggleBtn) toggleBtn.textContent = 'Hide List';
        if (rollCallOpen) {
            applyRollCallCompleteUi();
        } else {
            clearPromptTimer();
            awaitingVoiceMark = false;
            window.speechSynthesis.cancel();
            if (rollCallRecognition) {
                try { rollCallRecognition.stop(); } catch (e) { /* ignore */ }
            }
        }
    } else {
        if (rollCallOpen) {
            resetRollCallCompleteUi();
        }
    }
}

function showCurrent() {
    if (!filteredRows.length) {
        const nameNode = document.getElementById('rollName');
        const metaNode = document.getElementById('rollMeta');
        if (nameNode) nameNode.textContent = '-';
        if (metaNode) metaNode.textContent = 'No students to mark';
        setVoiceStatus('No students to mark');
        refreshProgress();
        return;
    }
    if (currentIndex < 0) currentIndex = 0;
    if (currentIndex >= filteredRows.length) currentIndex = filteredRows.length - 1;
    const row = filteredRows[currentIndex];
    const name = row.getAttribute('data-name') || '-';
    const grade = row.getAttribute('data-grade') || '-';
    const roll = row.getAttribute('data-roll') || '';
    const meta = 'Grade ' + grade + (roll ? ' • Roll ' + roll : '');
    document.getElementById('rollName').textContent = name;
    document.getElementById('rollMeta').textContent = meta;
    refreshProgress();

    if (rollCallOpen) {
        awaitingVoiceMark = true;
        initRollCallVoice();
        if (rollCallRecognition) {
            try { rollCallRecognition.start(); } catch (e) { /* ignore */ }
        }
        speakCurrentPrompt();
    }
}

function markCurrent(present) {
    if (!filteredRows.length) return;
    window.__monitorSuppressUntil = Date.now() + 1800;
    awaitingVoiceMark = false;
    clearPromptTimer();
    window.speechSynthesis.cancel();
    if (rollCallRecognition) {
        try { rollCallRecognition.stop(); } catch (e) { /* ignore */ }
    }
    const row = filteredRows[currentIndex];
    const name = row.getAttribute('data-name');
    setRowVisual(row, present);
    markAttendanceSilent(name, present).then(function (d) {
        currentIndex++;
        if (currentIndex >= filteredRows.length) {
            refreshProgress();
            return;
        }
        showCurrent();
    });
}

function nextStudent() { currentIndex++; showCurrent(); }
function prevStudent() { currentIndex--; showCurrent(); }
function skipStudent() { nextStudent(); }
function startRollCall() {
    const modal = document.getElementById('rollCallModal');
    const list = document.getElementById('listPanel');
    if (list) list.style.display = 'none';
    if (modal) modal.style.display = 'flex';
    rollCallOpen = true;
    awaitingVoiceMark = true;
    resetRollCallCompleteUi();
    var sum = document.getElementById('rollSummary');
    if (sum) {
        var total = filteredRows.length;
        var mk = 0;
        filteredRows.forEach(function (r) {
            if (r.classList.contains('marked-present') || r.classList.contains('marked-absent')) mk++;
        });
        sum.style.display = (mk >= total && total > 0) ? '' : 'none';
    }
    const toggleBtn = document.getElementById('toggleListBtn');
    if (toggleBtn) {
        toggleBtn.style.display = '';
        toggleBtn.textContent = 'Show List';
    }
    const startState = document.getElementById('attendanceStartState');
    if (startState) startState.style.display = 'none';
    showCurrent();
}
function closeRollCall() {
    const modal = document.getElementById('rollCallModal');
    if (modal) modal.style.display = 'none';
    rollCallOpen = false;
    awaitingVoiceMark = false;
    clearPromptTimer();
    window.speechSynthesis.cancel();
    if (rollCallRecognition) {
        try { rollCallRecognition.stop(); } catch (e) { /* ignore */ }
    }
    resetRollCallCompleteUi();
    updateRollCallCta();
}
function toggleListView() {
    const list = document.getElementById('listPanel');
    if (!list) return;
    const modal = document.getElementById('rollCallModal');
    const openList = list.style.display === 'none';
    list.style.display = openList ? '' : 'none';
    if (modal) modal.style.display = 'none';
    rollCallOpen = false;
    awaitingVoiceMark = false;
    clearPromptTimer();
    window.speechSynthesis.cancel();
    if (rollCallRecognition) {
        try { rollCallRecognition.stop(); } catch (e) { /* ignore */ }
    }
    if (openList) {
        currentPage = 1;
        renderPage();
    }
    updateRollCallCta();
    document.getElementById('toggleListBtn').textContent = openList ? 'Hide List' : 'Show List';
}

function applyFilters() {
    filteredRows = rows.slice();
    currentIndex = 0;
    currentPage = 1;
    showCurrent();
    renderPage();
}

function renderPage() {
    const total = filteredRows.length;
    const totalPages = Math.max(1, Math.ceil(total / pageSize));
    if (currentPage > totalPages) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;

    rows.forEach(function (row) { row.style.display = 'none'; });

    const startIdx = (currentPage - 1) * pageSize;
    const endIdx = startIdx + pageSize;
    filteredRows.forEach(function (row, idx) {
        if (idx >= startIdx && idx < endIdx) row.style.display = '';
    });

    const from = total === 0 ? 0 : startIdx + 1;
    const to = Math.min(endIdx, total);
    const meta = document.getElementById('pageMeta');
    if (meta) meta.textContent = 'Showing ' + from + '-' + to + ' of ' + total;

    const prev = document.getElementById('prevPageBtn');
    const next = document.getElementById('nextPageBtn');
    if (prev) prev.disabled = currentPage <= 1;
    if (next) next.disabled = currentPage >= totalPages;
}

function nextPage() {
    currentPage++;
    renderPage();
}

function prevPage() {
    currentPage--;
    renderPage();
}

var attendanceFilterForm = document.getElementById('attendanceFilterForm');
var dateEl = document.getElementById('dateInput');
var gradeEl = document.getElementById('gradeInput');
function submitFiltersNow() {
    if (attendanceFilterForm) attendanceFilterForm.submit();
}
if (dateEl) dateEl.addEventListener('change', submitFiltersNow);
if (gradeEl) gradeEl.addEventListener('change', submitFiltersNow);
showCurrent();
renderPage();
updateRollCallCta();
</script>
</body>
