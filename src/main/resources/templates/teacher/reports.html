<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Report Cards — Teacher</title>
    <link rel="icon" th:href="@{/favicon.svg}" type="image/svg+xml"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <style>
        body { }
        .page-wrap { max-width:860px; margin:0 auto; padding:24px 20px 60px; }
        h2 { font-size:1.25rem; font-weight:800; display:flex; align-items:center; gap:10px; margin-bottom:4px; }
        .sub { color:var(--muted); font-size:0.86rem; margin-bottom:24px; }
        label { font-size:0.78rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.07em; display:block; margin-bottom:5px; }
        select, input[type=text], input[type=date] {
            width:100%; padding:10px 14px; border-radius:10px;
            border:1px solid var(--surface2); background:var(--surface);
            color:var(--text); font-size:0.9rem;
        }
        select option { background:var(--surface); color:var(--text); }

        .form-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:14px; margin-bottom:20px; }

        .gen-btn {
            width:100%; padding:13px; border-radius:12px; border:none;
            background:linear-gradient(135deg,#6366f1,#8b5cf6);
            color:white; font-size:0.95rem; font-weight:800; cursor:pointer;
            display:flex; align-items:center; justify-content:center; gap:9px;
        }
        .gen-btn:hover { opacity:0.9; }
        .gen-btn:disabled { opacity:0.4; cursor:not-allowed; }

        .cache-note { font-size:0.78rem; color:#475569; margin-top:8px; text-align:center; }
        .cache-note a { color:#6366f1; cursor:pointer; }

        /* Report card */
        .report-section { display:none; margin-top:28px; }
        .report-section.visible { display:block; }

        .report-card {
            background:var(--surface); border:1px solid var(--surface2);
            border-radius:18px; overflow:hidden; color:var(--text);
        }

        /* Stats row */
        .stats-row { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:1px; background:var(--surface2); }
        .stat-box { padding:16px; text-align:center; background:var(--surface); }
        .stat-val  { font-size:1.6rem; font-weight:900; color:var(--primary); }
        .stat-lbl  { font-size:0.68rem; text-transform:uppercase; color:var(--muted); margin-top:2px; letter-spacing:0.08em; }

        /* Report text */
        .report-text-wrap { padding:28px; }
        .report-text-wrap pre { white-space:pre-wrap; font-family:inherit; font-size:0.93rem; line-height:1.85; color:var(--text); }

        /* Print actions */
        .print-bar { display:flex; gap:10px; padding:16px 20px; border-top:1px solid var(--surface2); flex-wrap:wrap; }
        .act-btn { padding:9px 18px; border-radius:9px; border:none; font-size:0.82rem; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:7px; }
        .btn-print  { background:rgba(99,102,241,0.15); color:#818cf8; }
        .btn-print:hover  { background:#6366f1; color:white; }
        .btn-regen  { background:rgba(239,68,68,0.1); color:#f87171; border:1px solid rgba(239,68,68,0.2); }
        .btn-regen:hover  { background:#ef4444; color:white; }

        .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.7s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }

        @media print {
            .top-nav, .form-grid, .gen-btn, .cache-note, .print-bar { display:none !important; }
            body, .page-wrap { background:white !important; color:black !important; }
            .report-card { border:none; border-radius:0; }
            .stats-row { background:#eee; }
            .stat-box  { background:white; }
            .stat-val  { color:#4338ca; }
            .report-text-wrap pre { color:black; }
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/loader :: loader}"></div>
<div th:replace="~{fragments/tabs :: tabBar('teacher')}"></div>

<div class="page-wrap">
    <h2><i class="fa-solid fa-file-lines"></i> Student Report Cards</h2>
    <p class="sub">Generates once per student per term using all H2 data. Cached — re-viewing is free.</p>

    <div class="form-grid">
        <div>
            <label>Student</label>
            <select id="studentSelect">
                <option value="">— Select student —</option>
                <option th:each="s : ${studentList}" th:value="${s.name}" th:text="${s.name}"></option>
            </select>
        </div>
        <div>
            <label>Term Label</label>
            <input type="text" id="termLabel" placeholder="Jan–Mar 2026" value="Jan–Mar 2026"/>
        </div>
        <div>
            <label>From Date</label>
            <input type="date" id="fromDate"/>
        </div>
        <div>
            <label>To Date</label>
            <input type="date" id="toDate"/>
        </div>
    </div>

    <button class="gen-btn" id="genBtn" onclick="generateReport()">
        <i class="fa-solid fa-file-circle-check"></i>
        <span id="genLabel">Generate Report Card</span>
        <span class="spinner" id="genSpinner" style="display:none;"></span>
    </button>
    <p class="cache-note">
        Report is generated once and cached. If you want a fresh report,
        <a onclick="regenerate()">click here to regenerate</a>.
    </p>

    <!-- Report display -->
    <div class="report-section" id="reportSection">
        <div class="report-card">
            <div class="stats-row">
                <div class="stat-box">
                    <div class="stat-val" id="rAttendance">—</div>
                    <div class="stat-lbl">Attendance</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" id="rFluency">—</div>
                    <div class="stat-lbl">Avg Fluency</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" id="rAccuracy">—</div>
                    <div class="stat-lbl">Avg Accuracy</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" id="rQuiz">—</div>
                    <div class="stat-lbl">Avg Quiz</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" id="rSessions">—</div>
                    <div class="stat-lbl">Reading Sessions</div>
                </div>
            </div>
            <div class="report-text-wrap">
                <pre id="reportText"></pre>
            </div>
            <div class="print-bar">
                <button class="act-btn btn-print" onclick="window.print()">
                    <i class="fa-solid fa-print"></i> Print / Save PDF
                </button>
                <button class="act-btn btn-regen" onclick="regenerate()">
                    <i class="fa-solid fa-rotate-right"></i> Regenerate
                </button>
            </div>
        </div>
    </div>
</div>

<script>
// Set sensible defaults for date range
const today = new Date();
const y = today.getFullYear();
document.getElementById('toDate').valueAsDate   = today;
document.getElementById('fromDate').valueAsDate = new Date(y, today.getMonth() - 3, today.getDate());

async function generateReport(forceRegen) {
    const studentName = document.getElementById('studentSelect').value;
    const termLabel   = document.getElementById('termLabel').value.trim();
    const fromDate    = document.getElementById('fromDate').value;
    const toDate      = document.getElementById('toDate').value;

    if (!studentName) { alert('Please select a student.'); return; }
    if (!termLabel)   { alert('Please enter a term label.'); return; }

    if (forceRegen) {
        await fetch('/teacher/reports/invalidate?studentName=' + encodeURIComponent(studentName) + '&termLabel=' + encodeURIComponent(termLabel), { method:'DELETE' });
    }

    const btn = document.getElementById('genBtn');
    btn.disabled = true;
    document.getElementById('genLabel').textContent  = forceRegen ? 'Regenerating…' : 'Generating…';
    document.getElementById('genSpinner').style.display = 'inline-block';

    const params = new URLSearchParams({ studentName, termLabel, fromDate, toDate });
    try {
        const r = await fetch('/teacher/reports/generate', { method:'POST', body: params });
        const d = await r.json();
        if (d.error) { alert('Error: ' + d.error); return; }
        showReport(d);
    } catch(e) {
        alert('Failed to generate report. Please try again.');
    } finally {
        btn.disabled = false;
        document.getElementById('genLabel').textContent = 'Generate Report Card';
        document.getElementById('genSpinner').style.display = 'none';
    }
}

function regenerate() { generateReport(true); }

function showReport(d) {
    document.getElementById('rAttendance').textContent = (d.attendancePercent ?? '—') + '%';
    document.getElementById('rFluency').textContent    = d.avgFluency    ? d.avgFluency.toFixed(1) : '—';
    document.getElementById('rAccuracy').textContent   = d.avgAccuracy   ? d.avgAccuracy.toFixed(1) : '—';
    document.getElementById('rQuiz').textContent       = d.avgQuizScore  ? Math.round(d.avgQuizScore) + '%' : '—';
    document.getElementById('rSessions').textContent   = d.readingSessions ?? '—';
    document.getElementById('reportText').textContent  = d.reportText   || '';
    document.getElementById('reportSection').className = 'report-section visible';
    document.getElementById('reportSection').scrollIntoView({ behavior:'smooth' });
}
</script>
</body>
</html>
