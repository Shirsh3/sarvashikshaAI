# Production profile — no secrets in file. Set these as environment variables (e.g. Railway Variables).
# Spring Boot maps env vars: OPENAI_API_KEY -> openai.api-key, etc.

spring.application.name=SarvashikshaAI

# Use PORT from host (Railway, etc.)
server.port=${PORT:8080}

# Thymeleaf: enable cache in prod
spring.thymeleaf.cache=true

# ── Placeholders: override with env vars in production ─────────────────────
# OPENAI_API_KEY
openai.api-key=
openai.api-base-url=https://api.openai.com/v1
# Default
openai.model=gpt-4o-mini
# Per-feature models (override via env if needed)
openai.model.assembly=gpt-4o-mini
openai.model.quiz=gpt-4.1-mini
openai.model.teaching=gpt-4.1

# YOUTUBE_DATAKEY
youtube.base-url=https://www.googleapis.com/youtube/v3
youtube.dataKey=

# Wikipedia (no key)
wikipedia.base-url=https://en.wikipedia.org/api/rest_v1

# ── PostgreSQL (Render: add Postgres from Dashboard, set env vars below) ─────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Logging
logging.level.org.springframework.security=INFO
logging.level.web=INFO
