# Production profile — no secrets in file. Set these as environment variables (e.g. Railway Variables).
# Spring Boot maps env vars: OPENAI_API_KEY -> openai.api-key, etc.

spring.application.name=SarvashikshaAI

# Use PORT from host (Railway, etc.)
server.port=${PORT:8080}

# Thymeleaf: enable cache in prod
spring.thymeleaf.cache=true

# ── Placeholders: override with env vars in production ─────────────────────
# OPENAI_API_KEY
openai.api-key=
openai.api-base-url=https://api.openai.com/v1
openai.model=gpt-4o-mini

# YOUTUBE_DATAKEY
youtube.base-url=https://www.googleapis.com/youtube/v3
youtube.dataKey=

# Wikipedia (no key)
wikipedia.base-url=https://en.wikipedia.org/api/rest_v1

# SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID
# SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.client-id=
spring.security.oauth2.client.registration.google.client-secret=
spring.security.oauth2.client.registration.google.scope=openid,profile,email,https://www.googleapis.com/auth/spreadsheets,https://www.googleapis.com/auth/drive.metadata.readonly

# ── H2 (ephemeral on Railway; consider PostgreSQL for persistence) ───────────
spring.datasource.url=jdbc:h2:file:./sarvsikshaai-data;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console
