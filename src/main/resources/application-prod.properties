# Production profile — no secrets in file. Set these as environment variables (e.g. Railway Variables).
# Spring Boot maps env vars: OPENAI_API_KEY -> openai.api-key, etc.

spring.application.name=SarvashikshaAI

# Use PORT from host (Railway, etc.)
server.port=${PORT:8080}

# Thymeleaf: enable cache in prod
spring.thymeleaf.cache=true

# ── Placeholders: override with env vars in production ─────────────────────
# OPENAI_API_KEY
openai.api-key=
openai.api-base-url=https://api.openai.com/v1
# Default
openai.model=gpt-4o-mini
# Per-feature models (override via env if needed)
openai.model.assembly=gpt-4o-mini
openai.model.quiz=gpt-4.1-mini
openai.model.teaching=gpt-4.1

# YOUTUBE_DATAKEY
youtube.base-url=https://www.googleapis.com/youtube/v3
youtube.dataKey=

# Wikipedia (no key)
wikipedia.base-url=https://en.wikipedia.org/api/rest_v1

# ── PostgreSQL (Render: add Postgres from Dashboard, set env vars below) ─────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-blue-mountain-a17dth5v-pooler.ap-southeast-1.aws.neon.tech/sarvsikshaai?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
# Default to update until all entities are Flyway-migrated; can be tightened to validate via env.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Keep DB connections small in production containers
spring.datasource.hikari.maximum-pool-size=5

# Avoid lazy-loading during view rendering
spring.jpa.open-in-view=false

# Flyway (auto)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Logging
logging.level.org.springframework.security=INFO
logging.level.web=INFO

# ── Friendly error page (avoid Whitelabel / stack traces) ──
server.error.whitelabel.enabled=false
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false