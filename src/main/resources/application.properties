# SarvashikshaAI — default (local dev). For production use spring.profiles.active=prod
# Secrets: use env vars or application-local.properties (gitignored) for local values.
server.port=${PORT:8080}
spring.application.name=SarvashikshaAI
spring.profiles.active=local
spring.thymeleaf.cache=false

# ── Placeholders: set in application-local.properties or env (see PRIVACY_AND_LEGAL.md) ──
openai.api-base-url=https://api.openai.com/v1
# Default (kept for backward compatibility)
openai.model=gpt-4o-mini
# Per-feature models
openai.model.assembly=gpt-4o-mini
openai.model.quiz=gpt-4.1-mini
openai.model.teaching=gpt-4.1
openai.api-key=

youtube.base-url=https://www.googleapis.com/youtube/v3
youtube.dataKey=

wikipedia.base-url=https://en.wikipedia.org/api/rest_v1

# ── PostgreSQL (set url/username/password in application-local.properties or env) ──
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sarvsikshaai}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
