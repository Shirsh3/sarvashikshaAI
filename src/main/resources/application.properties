# SarvashikshaAI — default (local dev). For production use spring.profiles.active=prod
# Secrets: use env vars or application-local.properties (gitignored) for local values.

server.port=${PORT:8080}
spring.application.name=SarvashikshaAI

spring.thymeleaf.cache=false

# ── Placeholders: set in application-local.properties or env (see PRIVACY_AND_LEGAL.md) ──
openai.api-base-url=https://api.openai.com/v1
openai.model=gpt-4o-mini
openai.api-key=

youtube.base-url=https://www.googleapis.com/youtube/v3
youtube.dataKey=

wikipedia.base-url=https://en.wikipedia.org/api/rest_v1

# Google OAuth: redirect URI http://localhost:8080/login/oauth2/code/google (prod: your domain)
spring.security.oauth2.client.registration.google.client-id=
spring.security.oauth2.client.registration.google.client-secret=
spring.security.oauth2.client.registration.google.scope=openid,profile,email,https://www.googleapis.com/auth/spreadsheets,https://www.googleapis.com/auth/drive.metadata.readonly

# ── H2 ───────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./sarvsikshaai-data;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
