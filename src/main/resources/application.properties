# SarvashikshaAI — default (local dev). For production use spring.profiles.active=prod
# Secrets: use env vars or application-local.properties (gitignored) for local values.
server.port=${PORT:8080}
spring.application.name=SarvashikshaAI
spring.profiles.active=local
spring.thymeleaf.cache=false

# ── Friendly error page (avoid Whitelabel / stack traces) ──
server.error.whitelabel.enabled=false
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# ── Placeholders: set in application-local.properties or env (see PRIVACY_AND_LEGAL.md) ──
openai.api-base-url=https://api.openai.com/v1
# Default (kept for backward compatibility)
openai.model=gpt-4o-mini
# Per-feature models
openai.model.assembly=gpt-4o-mini
openai.model.quiz=gpt-4.1-mini
openai.model.teaching=gpt-4.1
# Quiz cover art (Images API). Set openai.quiz.cover-image.enabled=true to generate one image per new quiz (uses API credits).
openai.model.quiz-cover=dall-e-3
openai.quiz.cover-image.enabled=false
openai.quiz.cover-image.size=1792x1024
openai.api-key=

youtube.base-url=https://www.googleapis.com/youtube/v3
youtube.dataKey=

wikipedia.base-url=https://en.wikipedia.org/api/rest_v1

# ── PostgreSQL (set url/username/password in application-local.properties or env) ──
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sarvsikshaai}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Flyway: we run migrations via a manual startup runner.
spring.flyway.enabled=false
flyway.manual.enabled=true
# Local/dev: allow app to boot even if Flyway can't classify a very new DB engine.
flyway.manual.fail-on-unsupported=false

# ── JWT auth (Teacher/Admin) ────────────────────────────────────────────────
# For local dev only. In production, set JWT_SECRET + other values via env vars.
jwt.secret=${JWT_SECRET:dev-only-secret-please-replace-with-envvar-1234567890}
jwt.issuer=${JWT_ISSUER:SarvaSikshaAI}
jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}
jwt.cookie-name=${JWT_COOKIE_NAME:SVAI_AUTH_TOKEN}

# Bootstrap dev accounts (runs when enabled; helpful since there is no signup flow yet).
auth.bootstrap.enabled=${AUTH_BOOTSTRAP_ENABLED:true}
auth.bootstrap.teacher.username=${AUTH_TEACHER_USERNAME:test}
auth.bootstrap.teacher.password=${AUTH_TEACHER_PASSWORD:test}
auth.bootstrap.admin.username=${AUTH_ADMIN_USERNAME:test}
auth.bootstrap.admin.password=${AUTH_ADMIN_PASSWORD:test}

auth.bootstrap.superadmin.username=${AUTH_SUPERADMIN_USERNAME:test}
auth.bootstrap.superadmin.password=${AUTH_SUPERADMIN_PASSWORD:test}
